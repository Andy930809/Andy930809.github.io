<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            font-size: 24px;
        }

        section {
            margin: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }

        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #333;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>欢迎来到我的个人主页</header>

    <section>
        <h2>关于我</h2>
        <p>阿瓜是阿呆。</p>
    </section>

    <section>
        <h2>联系我</h2>
        <p>Email: example@example.com</p>
        <p>GitHub: <a href="https://github.com/yourusername" target="_blank">你的GitHub</a></p>
    </section>

    <footer>
        © 2025 个人主页 | 由我设计
    </footer>

</body>

</html>
